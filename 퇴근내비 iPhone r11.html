<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>퇴근 내비</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg: #f2f2f7;
            --card: #ffffff;
            --primary: #007aff;
            --primary-light: #e5f1ff;
            --accent: #34c759;
            --danger: #ff3b30;
            --warning: #ff9500;
            --text: #000000;
            --text-sub: #6d6d72;
            --separator: #c6c6c8;
            --ios-radius: 16px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Status Bar */
        .status-bar {
            background: var(--card);
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 0.5px solid var(--separator);
        }
        .status-time { font-size: 15px; font-weight: 600; }
        .status-icons { display: flex; gap: 6px; align-items: center; font-size: 13px; }

        /* Navigation Bar */
        .nav-bar {
            background: rgba(242, 242, 247, 0.94);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 8px 20px 12px;
            position: sticky;
            top: 44px;
            z-index: 99;
            border-bottom: 0.5px solid var(--separator);
        }
        .nav-title { font-size: 34px; font-weight: 700; letter-spacing: -0.5px; }
        .nav-sub { font-size: 13px; color: var(--text-sub); margin-top: 2px; }

        /* Scroll Content */
        .scroll-content {
            padding: 16px;
            padding-bottom: calc(16px + var(--safe-bottom));
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Cards */
        .ios-card {
            background: var(--card);
            border-radius: var(--ios-radius);
            overflow: hidden;
        }
        .ios-card-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 0.3px;
            padding: 0 16px;
            margin-bottom: 6px;
        }

        /* Action Buttons */
        .action-card { padding: 16px; }
        .btn-now {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.15s;
            -webkit-appearance: none;
        }
        .btn-now:active { opacity: 0.7; }

        .time-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
        }
        input[type="time"] {
            flex: 1;
            background: var(--bg);
            border: none;
            border-radius: 12px;
            padding: 13px 14px;
            font-size: 17px;
            color: var(--text);
            -webkit-appearance: none;
            outline: none;
            font-family: inherit;
        }
        .btn-custom {
            background: var(--primary-light);
            color: var(--primary);
            border: none;
            border-radius: 12px;
            padding: 13px 18px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            -webkit-appearance: none;
            transition: opacity 0.15s;
        }
        .btn-custom:active { opacity: 0.7; }

        /* Comparison Banner */
        .compare-banner {
            display: none;
            padding: 14px 16px;
            border-bottom: 0.5px solid var(--separator);
        }
        .compare-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }
        .compare-item {
            background: var(--bg);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }
        .compare-item .label { font-size: 11px; color: var(--text-sub); margin-bottom: 4px; }
        .compare-item .val { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
        .diff-text {
            background: var(--bg);
            border-radius: 12px;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            line-height: 1.5;
        }

        /* Result Sections */
        .result-section { display: none; }
        .result-header {
            padding: 12px 16px 8px;
            border-bottom: 0.5px solid var(--separator);
        }
        .result-header-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-sub);
        }

        /* Course Box */
        .course-item {
            padding: 14px 16px;
            border-bottom: 0.5px solid var(--separator);
        }
        .course-item:last-child { border-bottom: none; }

        .course-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .course-name {
            font-size: 15px;
            font-weight: 600;
        }
        .course-duration {
            font-size: 13px;
            color: var(--text-sub);
        }
        .course-eta {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: -0.5px;
            margin-bottom: 12px;
        }

        /* Timeline */
        .timeline {
            list-style: none;
            margin: 0;
            padding: 0;
            position: relative;
        }
        .timeline::before {
            content: '';
            position: absolute;
            left: 6px;
            top: 8px;
            bottom: 8px;
            width: 1.5px;
            background: var(--separator);
        }
        .tl-item {
            position: relative;
            padding: 4px 0 4px 22px;
            font-size: 13px;
            color: var(--text-sub);
            line-height: 1.5;
        }
        .tl-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 9px;
            width: 13px;
            height: 13px;
            border-radius: 50%;
            background: var(--separator);
            border: 2px solid var(--card);
        }
        .tl-item.highlight::before { background: var(--primary); }
        .tl-item.highlight { color: var(--text); font-weight: 600; }

        /* Tags */
        .tag {
            display: inline-block;
            padding: 2px 7px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }
        .tag-time { background: #f2f2f7; color: var(--text); }
        .tag-train { background: var(--warning); color: white; }
        .tag-wait-green { background: #e8faf0; color: #1a7f37; }
        .tag-wait-orange { background: #fff4e5; color: #b35a00; }
        .tag-wait-red { background: #fff0f0; color: var(--danger); }
        .tag-wait-warn { background: #e8faf0; color: var(--danger); border: 1px dashed var(--danger); }

        /* Recommend Box */
        .recommend-box {
            margin-top: 12px;
            background: #eef4ff;
            border-radius: 12px;
            padding: 11px 14px;
            font-size: 13px;
            font-weight: 600;
            color: #1a56db;
            line-height: 1.6;
        }
        .recommend-box.good {
            background: #e8faf0;
            color: #1a7f37;
        }

        /* Optimal Card */
        .optimal-header {
            padding: 14px 16px 10px;
            border-bottom: 0.5px solid var(--separator);
        }
        .optimal-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .optimal-title { font-size: 17px; font-weight: 700; }
        .optimal-badge {
            font-size: 11px;
            color: var(--text-sub);
            background: var(--bg);
            padding: 4px 10px;
            border-radius: 20px;
        }
        .optimal-sub {
            font-size: 12px;
            color: var(--text-sub);
            margin-top: 4px;
        }
        .current-time-row {
            padding: 10px 16px;
            font-size: 13px;
            color: var(--text-sub);
            border-bottom: 0.5px solid var(--separator);
        }
        .current-time-row strong {
            color: var(--text);
            font-size: 15px;
        }

        /* Optimal Windows */
        .opt-window {
            padding: 14px 16px;
            border-bottom: 0.5px solid var(--separator);
            transition: background 0.2s;
        }
        .opt-window:last-child { border-bottom: none; }
        .opt-window.now-window { background: #e8faf0; }
        .opt-window.soon-window { background: #fff9f0; }
        .opt-window.passed-window { opacity: 0.4; }

        .opt-top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .opt-depart { font-size: 19px; font-weight: 700; }
        .opt-status {
            font-size: 12px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
        }
        .opt-status.now-s { background: #d1fae5; color: #065f46; }
        .opt-status.soon-s { background: #fef3c7; color: #92400e; }
        .opt-status.future-s { background: var(--bg); color: var(--text-sub); }
        .opt-status.passed-s { background: #fee2e2; color: #991b1b; }

        .opt-detail {
            font-size: 12px;
            color: var(--text-sub);
            line-height: 2;
        }
        .opt-total-wait {
            display: inline-block;
            background: var(--bg);
            padding: 1px 8px;
            border-radius: 10px;
            font-size: 11px;
            color: var(--text-sub);
            float: right;
            margin-top: 2px;
        }

        .error-msg {
            padding: 20px 16px;
            color: var(--danger);
            font-size: 14px;
            font-weight: 600;
            text-align: center;
        }

        /* Window Cards (recommend) */
        .win-card {
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 12px;
            margin-bottom: 8px;
            line-height: 1.8;
        }
        .win-card-top {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            margin-bottom: 3px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeIn 0.25s ease; }
    </style>
</head>
<body>

<!-- Status Bar -->
<div class="status-bar">
    <span class="status-time" id="statusTime">--:--</span>
    <div class="status-icons">
        <span>●●●</span>
        <span>WiFi</span>
        <span>🔋</span>
    </div>
</div>

<!-- Nav Bar -->
<div class="nav-bar">
    <div class="nav-title">🏠 퇴근 내비</div>
    <div class="nav-sub">판교 → 성남역 GTX 최적 경로</div>
</div>

<!-- Scroll Content -->
<div class="scroll-content">

    <!-- 입력 카드 -->
    <div>
        <div class="ios-card-title">퇴근 시간 선택</div>
        <div class="ios-card action-card">
            <button class="btn-now" onclick="runCommute('now')">⚡ 지금 바로 퇴근</button>
            <div class="time-row">
                <input type="time" id="customTimeInput">
                <button class="btn-custom" onclick="runCommute('custom')">계산</button>
            </div>
        </div>
    </div>

    <!-- 비교 대시보드 -->
    <div>
        <div class="ios-card animate-in" id="dashCard" style="display:none;">
            <div class="compare-banner" id="dashBoard">
                <div class="compare-grid">
                    <div class="compare-item">
                        <div class="label">지금 퇴근 시</div>
                        <div class="val" id="durNow">-</div>
                        <div style="font-size:12px;color:var(--text-sub);">분 소요</div>
                    </div>
                    <div class="compare-item">
                        <div class="label">선택 시간 시</div>
                        <div class="val" id="durCustom">-</div>
                        <div style="font-size:12px;color:var(--text-sub);">분 소요</div>
                    </div>
                </div>
                <div class="diff-text" id="diffText">계산 중...</div>
            </div>
        </div>
    </div>

    <!-- 지금 퇴근 결과 -->
    <div id="resNowWrap" style="display:none;">
        <div class="ios-card-title">⚡ 지금 퇴근 결과</div>
        <div class="ios-card animate-in" id="resNow">
            <div id="coursesNow"></div>
        </div>
    </div>

    <!-- 선택 시간 퇴근 결과 -->
    <div id="resCustomWrap" style="display:none;">
        <div class="ios-card-title">📅 선택 시간 퇴근 결과</div>
        <div class="ios-card animate-in" id="resCustom">
            <div id="coursesCustom"></div>
        </div>
    </div>

    <!-- 최적 출발시간 카드 -->
    <div>
        <div class="ios-card-title">최적 출발 타이밍</div>
        <div class="ios-card">
            <div class="optimal-header">
                <div class="optimal-header-row">
                    <div class="optimal-title">🎯 최적 출발시간 안내</div>
                    <span class="optimal-badge">업데이트: <span id="optimalLastUpdate">-</span></span>
                </div>
                <div class="optimal-sub">📍 경강선(판교→성남) · 성남역 GTX 대기 10분 미만</div>
            </div>
            <div class="current-time-row">현재 시각: <strong id="currentTimeDisplay">--:--</strong></div>
            <div id="optimalWindows">
                <div style="padding:20px;text-align:center;color:var(--text-sub);font-size:14px;">계산 중...</div>
            </div>
        </div>
    </div>

</div>

<script>
    const gyeonggangTimetable = [
        "09:02","09:14","09:25","09:38","09:50","10:04","10:18","10:36","10:54","11:14","11:33","11:55",
        "12:17","12:36","12:55","13:13","13:31","13:52","14:14","14:33","14:52","15:13","15:30","15:50",
        "16:11","16:31","16:50","16:10","17:10","17:27","17:44","17:59","18:14","18:30","18:48","19:06","19:24",
        "19:42","20:01","20:20","20:40","21:00","21:20","21:40","22:00","22:20","22:40","23:00","23:35"
    ];
    const gtxTimetable = ["05:52","06:11","06:20","06:28","06:51","07:16","07:36","07:53","08:16","08:28","08:42","08:56","09:17","09:34","09:54","10:11","10:17","10:43","11:11","11:37","11:57","12:16","12:39","12:48","13:21","13:41","13:53","14:07","14:27","14:52","15:17","15:40","15:54","16:09","16:32","16:50","17:06","17:22","17:41","17:54","18:17","18:35","18:49","18:58","19:35","19:53","20:11","20:26","20:42","20:57","21:19","21:39","21:57","22:15","22:37","23:07","23:32","23:57","24:22","24:46"];

    let bestNowMin = null;
    let bestCustomMin = null;

    // 상태바 시계
    function updateStatusTime() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2,'0');
        const m = String(now.getMinutes()).padStart(2,'0');
        document.getElementById('statusTime').textContent = `${h}:${m}`;
    }
    updateStatusTime();
    setInterval(updateStatusTime, 10000);

    function parseTime(timeStr, baseDate) {
        let [hrs, mins] = timeStr.split(':').map(Number);
        let d = new Date(baseDate.getTime());
        d.setHours(hrs, mins, 0, 0);
        if (hrs >= 24) { d.setDate(d.getDate()+1); d.setHours(hrs-24); }
        return d;
    }

    function formatTime(date) {
        let hrs = date.getHours();
        const mins = String(date.getMinutes()).padStart(2,'0');
        const ampm = hrs >= 12 ? '오후' : '오전';
        hrs = hrs % 12 || 12;
        return `${ampm} ${hrs}:${mins}`;
    }

    function getWaitTag(minutes, isTransfer) {
        if (isTransfer && minutes <= 5)
            return `<span class="tag tag-wait-warn">대기 ${minutes}분 ⚠️환승주의</span>`;
        if (minutes < 10) return `<span class="tag tag-wait-green">대기 ${minutes}분 😊</span>`;
        if (minutes < 15) return `<span class="tag tag-wait-orange">대기 ${minutes}분 😐</span>`;
        return `<span class="tag tag-wait-red">대기 ${minutes}분 😩</span>`;
    }

    function getPangyoWaitTag(minutes) {
        if (minutes === 0) return `<span class="tag tag-wait-green">바로 탑승! 0분</span>`;
        if (minutes < 5)   return `<span class="tag tag-wait-green">대기 ${minutes}분 여유</span>`;
        if (minutes < 10)  return `<span class="tag tag-wait-orange">대기 ${minutes}분</span>`;
        return `<span class="tag tag-wait-red">대기 ${minutes}분 긴 대기</span>`;
    }

    function getRecommendBox(startTime, pangyoWait, seongnamWait, baseDate, showBothSides) {
        const totalWait = pangyoWait + seongnamWait;
        let ggList = gyeonggangTimetable.map(t => parseTime(t, baseDate));
        let gtxList = gtxTimetable.map(t => parseTime(t, baseDate));

        let allWindows = [];
        for (let gg of ggList) {
            let leave = new Date(gg.getTime() - 10*60000);
            let arrSN = new Date(gg.getTime() + 2*60000);
            let readyGTX = new Date(arrSN.getTime() + 2*60000);
            let gtx = gtxList.find(t => t >= readyGTX);
            if (!gtx) continue;
            let snWait = Math.round((gtx - arrSN) / 60000);
            if (snWait < 10 && snWait < 15) {
                let minsFromInput = Math.round((leave - startTime) / 60000);
                let eta = new Date(gtx.getTime() + 31*60000);
                allWindows.push({ leave, gg, gtx, snWait, totalWait: snWait, minsFromInput, eta });
            }
        }

        if (!showBothSides) {
            if (pangyoWait < 5 && seongnamWait < 10) {
                return `<div class="recommend-box good">✅ 지금 타이밍이 최고! 판교 ${pangyoWait}분 + 성남 ${seongnamWait}분 = 총 ${totalWait}분으로 최적</div>`;
            }
            let next = allWindows.find(w => w.minsFromInput > 0);
            if (next) {
                return `<div class="recommend-box">💡 다음 최적 👉 <strong>${formatTime(next.leave)} 출발</strong><br>판교 바로탑승 → 성남 대기 ${next.snWait}분 → GTX ${formatTime(next.gtx)} → 🏠 ${formatTime(next.eta)}</div>`;
            }
            return '';
        }

        let before = allWindows.filter(w => w.minsFromInput < 0 && w.minsFromInput >= -90).slice(-3);
        let after  = allWindows.filter(w => w.minsFromInput > 0 && w.minsFromInput <= 90).slice(0,3);

        let html = `<div style="margin-top:12px;">
            <div style="font-size:12px;font-weight:600;color:var(--text-sub);margin-bottom:8px;">⏰ 입력시간 전후 최적 타이밍</div>`;

        if (pangyoWait < 5 && seongnamWait < 10) {
            html += `<div class="win-card" style="background:#e8faf0;border:1.5px solid #22c55e;">
                <div class="win-card-top"><span style="color:#15803d;">✅ ${formatTime(startTime)} — 이미 최적!</span></div>
                <div style="color:#555;font-size:11px;">판교 ${pangyoWait}분 + 성남 ${seongnamWait}분 = 총 ${totalWait}분</div>
            </div>`;
        } else if (!before.length && !after.length) {
            html += `<div style="text-align:center;font-size:12px;color:var(--text-sub);padding:8px;">이 시간대 주변 최적 창문 없음</div>`;
        }

        for (let w of before) {
            html += `<div class="win-card" style="background:#eff6ff;border:1px solid #bfdbfe;">
                <div class="win-card-top">
                    <span style="color:#1d4ed8;">⬅️ ${Math.abs(w.minsFromInput)}분 일찍 나가면 · <strong>${formatTime(w.leave)} 출발</strong></span>
                    <span style="color:var(--text-sub);font-size:11px;">🏠 ${formatTime(w.eta)}</span>
                </div>
                <div style="color:#555;font-size:11px;">판교 바로탑승 → 성남 대기 <span style="color:${w.snWait<5?'#16a34a':'#d97706'};font-weight:600;">${w.snWait}분</span> → GTX ${formatTime(w.gtx)}</div>
            </div>`;
        }
        for (let w of after) {
            html += `<div class="win-card" style="background:#fafafa;border:1px solid #e5e8eb;">
                <div class="win-card-top">
                    <span style="color:#374151;">➡️ ${w.minsFromInput}분 후 나가면 · <strong>${formatTime(w.leave)} 출발</strong></span>
                    <span style="color:var(--text-sub);font-size:11px;">🏠 ${formatTime(w.eta)}</span>
                </div>
                <div style="color:#555;font-size:11px;">판교 바로탑승 → 성남 대기 <span style="color:${w.snWait<5?'#16a34a':'#d97706'};font-weight:600;">${w.snWait}분</span> → GTX ${formatTime(w.gtx)}</div>
            </div>`;
        }
        html += `</div>`;
        return html;
    }

    function renderBothCourses(startTime, mode) {
        const baseDate = new Date(startTime);
        const showBoth = (mode === 'custom');
        let html = '';
        let bestMin = Infinity;

        // 코스 1: 경강선
        const arr1Pangyo = new Date(startTime.getTime() + 10*60000);
        let gg1 = gyeonggangTimetable.map(t => parseTime(t, baseDate)).find(t => t >= arr1Pangyo);

        html += `<div class="course-item">`;
        if (gg1) {
            const arrSN1 = new Date(gg1.getTime() + 2*60000);
            const readyGTX1 = new Date(arrSN1.getTime() + 2*60000);
            let gtx1 = gtxTimetable.map(t => parseTime(t, baseDate)).find(t => t >= readyGTX1);
            if (gtx1) {
                const eta1 = new Date(gtx1.getTime() + 31*60000);
                const dur1 = Math.round((eta1 - startTime) / 60000);
                if (dur1 < bestMin) bestMin = dur1;
                const snWait1 = Math.round((gtx1 - arrSN1) / 60000);
                const pgWait1 = Math.round((gg1 - arr1Pangyo) / 60000);

                html += `
                <div class="course-header">
                    <span class="course-name">🚇 코스 1: 경강선 환승</span>
                    <span class="course-duration">⏱ ${dur1}분</span>
                </div>
                <div class="course-eta">${formatTime(eta1)} 도착</div>
                <ul class="timeline">
                    <li class="tl-item highlight">사무실 출발 <span class="tag tag-time">${formatTime(startTime)}</span></li>
                    <li class="tl-item">판교역 도착 <span class="tag tag-time">${formatTime(arr1Pangyo)}</span> ${getPangyoWaitTag(pgWait1)}</li>
                    <li class="tl-item">경강선 출발 🚇 <span class="tag tag-train">${formatTime(gg1)}</span></li>
                    <li class="tl-item">성남역 환승 <span class="tag tag-time">${formatTime(arrSN1)}</span> ${getWaitTag(snWait1, true)}</li>
                    <li class="tl-item">GTX-A 출발 🚄 <span class="tag tag-train">${formatTime(gtx1)}</span></li>
                    <li class="tl-item highlight">🏠 집 도착 <span class="tag tag-time">${formatTime(eta1)}</span></li>
                </ul>
                ${getRecommendBox(startTime, pgWait1, snWait1, baseDate, showBoth)}`;
            } else {
                html += `<div class="course-name">🚇 코스 1: 경강선 환승</div><div class="error-msg">연계 GTX 없음</div>`;
            }
        } else {
            html += `<div class="course-name">🚇 코스 1: 경강선 환승</div><div class="error-msg">경강선 막차 이후</div>`;
        }
        html += `</div>`;

        // 코스 2: 도보
        const arrSN2 = new Date(startTime.getTime() + 20*60000);
        let gtx2 = gtxTimetable.map(t => parseTime(t, baseDate)).find(t => t >= arrSN2);

        html += `<div class="course-item">`;
        if (gtx2) {
            const eta2 = new Date(gtx2.getTime() + 31*60000);
            const dur2 = Math.round((eta2 - startTime) / 60000);
            if (dur2 < bestMin) bestMin = dur2;
            const snWait2 = Math.round((gtx2 - arrSN2) / 60000);

            html += `
            <div class="course-header">
                <span class="course-name">🏃 코스 2: 성남역 직행 도보</span>
                <span class="course-duration">⏱ ${dur2}분</span>
            </div>
            <div class="course-eta">${formatTime(eta2)} 도착</div>
            <ul class="timeline">
                <li class="tl-item highlight">사무실 출발 (도보) <span class="tag tag-time">${formatTime(startTime)}</span></li>
                <li class="tl-item">성남역 도착 <span class="tag tag-time">${formatTime(arrSN2)}</span> ${getWaitTag(snWait2, false)}</li>
                <li class="tl-item">GTX-A 출발 🚄 <span class="tag tag-train">${formatTime(gtx2)}</span></li>
                <li class="tl-item highlight">🏠 집 도착 <span class="tag tag-time">${formatTime(eta2)}</span></li>
            </ul>`;
        } else {
            html += `<div class="course-name">🏃 코스 2: 성남역 직행 도보</div><div class="error-msg">GTX 막차 이후</div>`;
        }
        html += `</div>`;

        return { html, bestMin: bestMin === Infinity ? null : bestMin };
    }

    function runCommute(mode) {
        let startTime;
        if (mode === 'now') {
            startTime = new Date();
            const result = renderBothCourses(startTime, 'now');
            document.getElementById('coursesNow').innerHTML = result.html;
            document.getElementById('resNowWrap').style.display = 'block';
            bestNowMin = result.bestMin;
        } else {
            const input = document.getElementById('customTimeInput').value;
            if (!input) { alert('퇴근 시간을 선택해주세요!'); return; }
            startTime = new Date();
            const [h, m] = input.split(':').map(Number);
            startTime.setHours(h, m, 0, 0);
            const result = renderBothCourses(startTime, 'custom');
            document.getElementById('coursesCustom').innerHTML = result.html;
            document.getElementById('resCustomWrap').style.display = 'block';
            bestCustomMin = result.bestMin;
        }
        updateDashboard();
        // scroll to result
        setTimeout(() => {
            const el = mode === 'now' ? document.getElementById('resNowWrap') : document.getElementById('resCustomWrap');
            el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 100);
    }

    function updateDashboard() {
        if (!bestNowMin || !bestCustomMin) return;
        document.getElementById('dashCard').style.display = 'block';
        document.getElementById('dashBoard').style.display = 'block';
        document.getElementById('durNow').textContent = bestNowMin;
        document.getElementById('durCustom').textContent = bestCustomMin;
        const diff = bestCustomMin - bestNowMin;
        const el = document.getElementById('diffText');
        if (diff > 0) {
            el.innerHTML = `지금 가는 것보다 <span style="color:var(--danger);font-size:16px;">${diff}분 더 걸려요</span> 🏃`;
        } else if (diff < 0) {
            el.innerHTML = `이때 나가면 <span style="color:var(--accent);font-size:16px;">${Math.abs(diff)}분 단축!</span> ⏰`;
        } else {
            el.innerHTML = `<span style="color:var(--primary);">소요시간 동일</span> — 편할 때 출발하세요`;
        }
    }

    function computeOptimalCard() {
        const now = new Date();
        const baseDate = new Date(now);
        document.getElementById('currentTimeDisplay').textContent = formatTime(now);

        let ggList = gyeonggangTimetable.map(t => parseTime(t, baseDate));
        let gtxList = gtxTimetable.map(t => parseTime(t, baseDate));

        let windows = [];
        for (let gg of ggList) {
            let leave = new Date(gg.getTime() - 10*60000);
            let arrSN = new Date(gg.getTime() + 2*60000);
            let readyGTX = new Date(arrSN.getTime() + 2*60000);
            let gtx = gtxList.find(t => t >= readyGTX);
            if (!gtx) continue;
            let snWait = Math.round((gtx - arrSN) / 60000);
            if (snWait < 10 && snWait < 15) {
                let minsFromNow = Math.round((leave - now) / 60000);
                let eta = new Date(gtx.getTime() + 31*60000);
                windows.push({ leave, gg, gtx, snWait, totalWait: snWait, minsFromNow, eta });
            }
        }

        let passed = windows.filter(w => w.minsFromNow < -2).slice(-1);
        let upcoming = windows.filter(w => w.minsFromNow >= -2).slice(0,4);
        let relevant = [...passed, ...upcoming];

        let html = '';
        if (!relevant.length) {
            html = `<div class="error-msg">오늘은 더 이상 최적 출발 시간이 없습니다.</div>`;
        } else {
            for (let w of relevant) {
                let cls, scls, label;
                if (w.minsFromNow < -2) {
                    cls = 'passed-window'; scls = 'passed-s'; label = `${Math.abs(w.minsFromNow)}분 전 (지남)`;
                } else if (Math.abs(w.minsFromNow) <= 2) {
                    cls = 'now-window'; scls = 'now-s'; label = '🔴 지금 바로!';
                } else if (w.minsFromNow <= 10) {
                    cls = 'soon-window'; scls = 'soon-s'; label = `⏰ ${w.minsFromNow}분 후`;
                } else {
                    cls = ''; scls = 'future-s'; label = `${w.minsFromNow}분 후`;
                }
                html += `
                <div class="opt-window ${cls}">
                    <div class="opt-top-row">
                        <span class="opt-depart">${formatTime(w.leave)} 출발</span>
                        <span class="opt-status ${scls}">${label}</span>
                    </div>
                    <div class="opt-detail">
                        🚌 판교역 <strong style="color:#16a34a;">바로 탑승</strong> →
                        경강선 <span class="tag tag-train">${formatTime(w.gg)}</span> →
                        성남역 대기 <span class="tag tag-wait-green">${w.snWait}분</span> →
                        GTX <span class="tag tag-train">${formatTime(w.gtx)}</span> →
                        🏠 <strong>${formatTime(w.eta)}</strong>
                        <span class="opt-total-wait">총 대기 ${w.totalWait}분</span>
                    </div>
                </div>`;
            }
        }

        document.getElementById('optimalWindows').innerHTML = html;
        document.getElementById('optimalLastUpdate').textContent = formatTime(now);
    }

    computeOptimalCard();
    setInterval(computeOptimalCard, 60000);
</script>
</body>
</html>
